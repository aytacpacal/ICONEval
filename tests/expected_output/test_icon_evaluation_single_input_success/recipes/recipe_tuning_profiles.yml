# ESMValTool
#DASK --memory_limit=7760MB
#DASK --n_workers=4
#TAGS atmosphere
#TAGS tuning
#TAGS profiles
---
documentation:
  title: Model Evaluation with Focus on Tuning (Profiles).
  description: '<p>Profiles of variables relevant for tuning.</p> <p><i>Note</i></p>
    <p>Time ranges for the different datasets differ: <ul> <li>ICON: *</li> <li>CMIP6:
    19950101/20141231</li> <li>ERA5: 20010101/20201231</li> </ul></p>

    '
  authors:
  - schlund_manuel
  - lauer_axel
datasets_cmip6:
- project: CMIP6
  dataset: '*'
  exp: historical
  ensemble: r1i1p1f1
  grid: '*'
  institute: '*'
  timerange: 19950101/20141231
datasets_ta:
- project: native6
  dataset: ERA5
  type: reanaly
  version: v1
  tier: 3
  reference_for_monitor_diags: true
  alias: ERA5
  timerange: 20010101/20201231
datasets_ua:
- project: native6
