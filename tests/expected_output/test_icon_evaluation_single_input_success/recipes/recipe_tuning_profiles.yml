  common_cbar: true
  fontsize: 8
  pyplot_kwargs:
    suptitle: '{title}'
  plot_kwargs:
    default:
      cmap: plasma
      levels: 12
datasets:
- supplementary_variables:
  - short_name: areacella
    skip: true
  - short_name: areacello
    skip: true
  - short_name: sftlf
    skip: true
  - short_name: sftof
    skip: true
  dataset: ICON
  exp: input
  project: ICON
preprocessors:
  create_1d_profile_60n:
    custom_order: true
    extract_levels:
      levels:
        cmor_table: CMIP6
        coordinate: plev19
      scheme: linear
      coordinate: air_pressure
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0.0
      end_longitude: 360.0
      start_latitude: 59.0
      end_latitude: 61.0
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
  create_1d_profile_60s:
    custom_order: true
    extract_levels:
      levels:
        cmor_table: CMIP6
        coordinate: plev19
      scheme: linear
      coordinate: air_pressure
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0.0
      end_longitude: 360.0
      start_latitude: -61.0
      end_latitude: -59.0
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
  create_zonal_mean_profile:
    custom_order: true
    extract_levels:
      levels:
        cmor_table: CMIP6
        coordinate: plev19
      scheme: linear
      coordinate: air_pressure
    regrid:
      target_grid: 2x2
      scheme: linear
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
