# ESMValTool
#TAGS sanity-consistency-checks
#TAGS precipitation
#TAGS timeseries
---
documentation:
  title: Basic sanity checks.
  description: 'Calculate basic sanity checks on monthly output e.g. for monitoring
    new model runs.

    '
  authors:
  - bock_lisa
  - lauer_axel
plot_script:
  script: monitor/multi_datasets.py
  facet_used_for_labels: legend_label
  figure_kwargs:
    figsize:
    - 7
    - 5
  group_variables_by: alias
  plot_filename: '{plot_type}_{exp}_{real_name}_{dataset}_{mip}'
  plot_folder: '{plot_dir}'
timeseries_plot:
  caption: 'Time series of global mean (solid line) and global minimum/maximum (dashed
    lines) {long_name}. Red horizontal lines show "reasonable" ranges for the global
    mean calculated from minimum and maximum global mean values found in reference
    datasets (observations, reanalyses) across all months and all reference datasets.

    '
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor:
    - 0.5
    - -0.4
    borderaxespad: 0.0
  pyplot_kwargs:
    ylabel: '{short_name} [{units}]'
  plot_kwargs:
    global mean:
      color: C0
      label: '{dataset} ({exp})'
      linewidth: 1.25
    global sum:
      color: C0
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 3
    global min:
      color: C0
      label: null
      linestyle: dashed
      linewidth: 1.25
    global max:
      color: C0
      label: null
      linestyle: dashed
      linewidth: 1.25
datasets:
- supplementary_variables:
  - short_name: areacella
    skip: true
  - short_name: areacello
    skip: true
  - short_name: sftlf
    skip: true
  - short_name: sftof
    skip: true
  dataset: ICON
  exp: input
  project: ICON
preprocessors:
  global_mean:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: mean
  global_mean_pr:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: mean
    convert_units:
      units: mm day-1
  global_min:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: min
  global_min_pr:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: min
    convert_units:
      units: mm day-1
  global_max:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: max
  global_max_pr:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: max
    convert_units:
      units: mm day-1
