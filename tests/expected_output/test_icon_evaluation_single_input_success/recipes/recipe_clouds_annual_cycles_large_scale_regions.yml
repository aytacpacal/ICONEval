preprocessors:
  create_monthly_climatology_global:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
  create_monthly_climatology_tropics:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -30
      end_latitude: 30
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
  create_monthly_climatology_southern_ocean:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -65
      end_latitude: -30
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
  create_monthly_climatology_storm_tracks:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 45
      end_latitude: 60
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
