  - short_name: sftof
    skip: true
  dataset: ICON
  exp: input
  project: ICON
preprocessors:
  create_global_annual_mean_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
  create_northatlantic_annual_mean_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_shape:
      shapefile: World_Seas_IHO_v3/World_Seas_IHO_v3.shp
      method: contains
      crop: true
      ids:
      - North Atlantic Ocean
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
  create_southernocean_annual_mean_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_shape:
      shapefile: World_Seas_IHO_v3/World_Seas_IHO_v3.shp
      method: contains
      crop: true
      ids:
      - Southern Ocean
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
