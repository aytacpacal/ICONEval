documentation:
  title: Overall Model Evaluation (Portrait plot).
  description: '<p>Portrait plot of different variables covering different aspects
    of the Earth system.</p> <p><i>Note</i></p> <p>Time ranges for the different datasets
    differ: <ul> <li>ICON: *</li> <li>CMIP6: 19950101/20141231</li> <li>CERES-EBAF:
    20030101/20221231 (asr, lwcre, rlut, rsut, swcre)</li> <li>CLARA-AVHRR: 19990101/20181231</li>
    <li>ERA5: 20000101/20191231 (hus, pr alt., ta, tas, tauu, ua)</li> <li>ESACCI-CLOUD:
    19970101/20161231 (clivi, clwvi, clt, lwcre alt., lwp, swcre alt.)</li> <li>ESACCI-WATERVAPOUR:
    20030101/20171231 (prw)</li> <li>GPCP-SG: 20030101/20221231 (pr)</li> <li>HadCRUT5:
    20020101/20211231 (tas)</li> <li>MODIS: 20030101/20181231 (clivi alt., clwvi alt.,
    lwp alt.)</li> <li>PATMOS-x: 19970101/20161231 (clt alt.)</li> </ul></p> <p>If
    two reference data sets are given for a variable, the one marked with "alt." corresponds
    to the alternative dataset and is plotted in the lower right corner.</p>

    '
  authors:
  - schlund_manuel
  - lindenlaub_lukas
  - cammarano_diego
