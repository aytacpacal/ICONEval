datasets:
- supplementary_variables:
  - short_name: areacella
    skip: true
  - short_name: areacello
    skip: true
  - short_name: sftlf
    skip: true
  - short_name: sftof
    skip: true
  dataset: ICON
  exp: input
  project: ICON
preprocessors:
  create_map:
    custom_order: true
    align_metadata:
      target_project: OBS6
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    climate_statistics:
      operator: mean
      period: full
    multi_model_statistics:
      statistics:
      - mean
      span: full
      keep_input_datasets: false
      ignore_scalar_coords: true
      exclude:
      - ICON
      - ICON-XPP
