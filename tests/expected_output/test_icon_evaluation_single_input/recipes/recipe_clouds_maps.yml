documentation:
  title: Model Evaluation with Focus on Clouds (Maps).
  description: '<p>Maps of several cloud-related variables.</p> <p><i>Note</i></p>
    <p>Time range for ICON output: *</p> </p>The references are multi-observational
    means from the following datasets: <ul> <li>clivi: CLARA-AVHRR (19990101/20181231),
    CLOUDSAT-L2 (20060101/20171231), ERA5 (20000101/20191231), ESACCI-CLOUD (19970101/20161231),
    MERRA2 (20020101/20211231), MODIS (20030101/20181231)</li> <li>clt: CLARA-AVHRR
    (19990101/20181231), ERA5 (20020101/20211231), ESACCI-CLOUD (19970101/20161231),
    MERRA2 (20020101/20211231), MODIS (20030101/20181231), PATMOS-x (19970101/20161231)</li>
    <li>clwvi: CLARA-AVHRR (19990101/20181231), CLOUDSAT-L2 (20060101/20171231), ERA5
    (20000101/20191231), ESACCI-CLOUD (19970101/20161231), MERRA2 (20030101/20221231),
    MODIS (20030101/20181231)</li> <li>lwcre: CERES-EBAF (20030101/20221231), ERA5
    (20020101/20211231), ESACCI-CLOUD (19970101/20161231), ISCCP-FH (19970101/20161231),
    MERRA2 (20020101/20211231)</li> <li>lwp: CLARA-AVHRR (19990101/20181231), CLOUDSAT-L2
    (20060101/20171231), ERA5 (20000101/20191231), ESACCI-CLOUD (19970101/20161231),
    MERRA2 (20030101/20221231), MODIS (20030101/20181231)</li> <li>prw: ERA5 (20020101/20211231),
    ESACCI-WATERVAPOUR (20030101/20171231), ISCCP-FH (19970101/20161231), MERRA2 (20020101/20211231)</li>
    <li>swcre: CERES-EBAF (20030101/20221231), ESACCI-CLOUD (19970101/20161231), ISCCP-FH
    (19970101/20161231), MERRA2 (20020101/20211231)</li> </ul></p>

    '
