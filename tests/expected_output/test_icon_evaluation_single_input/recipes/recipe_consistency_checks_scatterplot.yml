# ESMValTool
#TAGS sanity-consistency-checks
#TAGS scatterplots
---
documentation:
  title: Consistency checks (Scatter plots).
  description: 2D histograms for different consistency checks.
  authors:
  - bock_lisa
  - lauer_axel
supplementary_variables:
- short_name: areacella
  skip: true
- short_name: areacello
  skip: true
- short_name: sftlf
  skip: true
- short_name: sftof
  skip: true
datasets:
- supplementary_variables:
  - short_name: areacella
    skip: true
  - short_name: areacello
    skip: true
  - short_name: sftlf
    skip: true
  - short_name: sftof
    skip: true
  dataset: ICON
  exp: input
  project: ICON
preprocessors:
  common_grid_tas:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_outside_range:
      minimum: 240.0
      maximum: 315.0
  global_annual_mean_tas_anomaly:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
    anomalies:
      period: full
  common_grid_prw:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    mask_outside_range:
      minimum: 0.0
      maximum: 70.0
  global_annual_mean_prw_anomaly:
    custom_order: true
    regrid:
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
      target_grid: 2x2
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
    anomalies:
      period: full
      relative: true
diagnostics:
  prw_anom_vs_tas_anom:
    description: Scatter plot of tas anomalies vs. prw anomalies.
    themes:
    - phys
    realms:
    - atmos
    variables:
      prw:
        mip: Amon
        preprocessor: global_annual_mean_prw_anomaly
        supplementary_variables:
        - short_name: areacella
          skip: true
        - short_name: areacello
          skip: true
        - short_name: sftlf
          skip: true
        - short_name: sftof
          skip: true
      tas:
        mip: Amon
        preprocessor: global_annual_mean_tas_anomaly
        supplementary_variables:
        - short_name: areacella
          skip: true
        - short_name: areacello
          skip: true
        - short_name: sftlf
          skip: true
        - short_name: sftof
          skip: true
    scripts:
      plot:
        script: seaborn_diag.py
        seaborn_func: lmplot
        reset_index: true
        write_netcdf: true
        seaborn_kwargs:
          x: tas
          y: prw
          hue: alias
        plot_object_methods:
          set:
            xlabel: Delta 2m temperature [K]
            ylabel: Delta water vapor [%]
        seaborn_settings:
          style: ticks
        suptitle: Temperature - water vapor mass
  prw_vs_tas:
    description: Scatter plot of prw vs. tas.
    themes:
    - phys
    realms:
    - atmos
    variables:
      prw:
        mip: Amon
        preprocessor: common_grid_prw
        supplementary_variables:
        - short_name: areacella
          skip: true
        - short_name: areacello
          skip: true
        - short_name: sftlf
          skip: true
        - short_name: sftof
          skip: true
      tas:
        mip: Amon
        preprocessor: common_grid_tas
        supplementary_variables:
        - short_name: areacella
          skip: true
        - short_name: areacello
          skip: true
        - short_name: sftlf
          skip: true
        - short_name: sftof
          skip: true
    scripts:
      plot:
        script: seaborn_jointplot_histogram.py
        x: tas
        y: prw
        bins: 20
        joint_kws:
          vmax: 0.015
          cmap: YlGnBu
        cbar: true
        cbar_kws:
          extend: max
        marginal_kws:
          color: darkturquoise
        seaborn_settings:
          style: ticks
          rc:
            axes.titlepad: 15.0
        suptitle: 2m temperature - water vapor mass
        plot_filename: jointplot_tas_prw
