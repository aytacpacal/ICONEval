          reference_for_monitor_diags: true
          alias: OSI-450-sh
          timerange: '*'
      siconc_sep:
        short_name: siconc
        mip: SImon
        title: Sea-Ice Area Percentage in September
        preprocessor: create_map_sh_sep
        additional_datasets:
        - project: OBS
          dataset: OSI-450-sh
          type: reanaly
          version: v3
          tier: 2
          mip: OImon
          reference_for_monitor_diags: true
