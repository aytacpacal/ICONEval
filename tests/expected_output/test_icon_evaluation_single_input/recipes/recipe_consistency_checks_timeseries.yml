  description: Time series for different consistency checks.
  authors:
  - lauer_axel
  - bock_lisa
datasets_ps:
- dataset: ERA5
  project: native6
  type: reanaly
  version: v1
  tier: 3
  timerange: 19790101/20141231
datasets_prw:
- dataset: ERA5
  project: native6
  type: reanaly
  version: v1
  tier: 3
  timerange: 19790101/20141231
- dataset: MERRA2
  project: OBS6
  type: reanaly
  version: 5.12.4
  tier: 3
  timerange: 19800101/20141231
- dataset: ESACCI-WATERVAPOUR
