datasets:
- supplementary_variables:
  - short_name: areacella
    skip: true
  - short_name: areacello
    skip: true
  - short_name: sftlf
    skip: true
  - short_name: sftof
    skip: true
  dataset: ICON
  exp: input
  project: ICON
preprocessors:
  create_monthly_climatology_nh:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 30
      end_latitude: 90
    area_statistics:
      operator: sum
    climate_statistics:
      period: month
    convert_units:
      units: 1e6 km2
  create_monthly_climatology_sh:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: -30
    area_statistics:
      operator: sum
    climate_statistics:
      period: month
    convert_units:
      units: 1e6 km2
