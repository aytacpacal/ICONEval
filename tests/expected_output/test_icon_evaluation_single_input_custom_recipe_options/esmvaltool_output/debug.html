
<!doctype html>
<html>
<head>
    <title>ESMValTool recipes</title>
</head>
<style>
#recipes {
    font-family: Arial, Helvetica, sans-serif;
    border-collapse: collapse;
    width: 100%;
}

#recipes td, #recipes th {
    border: 1px solid #ddd;
    padding: 8px;
}

#recipes tr:nth-child(even){background-color: #f2f2f2;}

#recipes tr:hover {background-color: #ddd;}

#recipes th {
    padding-top: 12px;
    padding-bottom: 12px;
    text-align: left;
    background-color: hsl(200, 50%, 50%);
    color: white;
}
</style>
<body>
    <table id="recipes">
      <tr><th>status</th>  <th>recipe output</th>  <th>run date</th>  <th>estimated run duration</th>  <th>estimated max memory (GB)</th>  <th>average cpu</th></tr>
</table>
</body>
</html>
