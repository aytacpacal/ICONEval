plot_script:
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize:
    - 7
    - 5
  group_variables_by: variable_group
  plot_filename: '{plot_type}_{exp}_{real_name}_{dataset}_{mip}'
  plot_folder: '{plot_dir}'
variable_vs_lat_plot:
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor:
    - 0.5
    - -0.4
    borderaxespad: 0.0
  pyplot_kwargs:
    title: '{title}'
  plot_kwargs:
    ICON:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    ICON_historical-202510p1:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    ICON_ICON-XPP:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    ICON_ICON-XPP_historical-202510p1:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    default:
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: '{project}'
    CMIP6_CESM2:
      label: '{project}'
    OBS:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
    OBS6:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dashdot
    native6:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dotted
    OBS_HadISST:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
    OBS6_ESACCI-SST:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dashed
    OBS6_NOAA-ERSSTv5:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dashdot
    OBS6_WOA:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dotted
preprocessors:
  create_zonal_mean:
    custom_order: true
    regrid:
      scheme: linear
      target_grid: 2x2
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -77
      end_latitude: 90
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: degC
  create_zonal_mean_sos:
    custom_order: true
    extract_levels:
      coordinate: depth
      levels: 0
      scheme: nearest_extrapolate
    regrid:
      scheme: linear
      target_grid: 2x2
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -77
      end_latitude: 90
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: g/kg
  default: {}
