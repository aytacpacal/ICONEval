# ESMValTool
#TAGS ocean
#TAGS zonal-means
---
documentation:
  title: Ocean Evaluation (Zonal Means).
  description: '<p>Zonal mean line plots of ocean variables.</p> <p><i>Note</i></p>
    <p>Time ranges for the different datasets differ: <ul> <li>ICON-XPP: 19790101/19990101</li>
    <li>ESACCI-SST: 20020101/20211231</li> <li>HadISST: 20020101/20211231</li> <li>NOAA-ERSSTv5:
    20010101/20201231</li> <li>WOA: 20000101/20001231</li> </ul></p>

    '
  authors:
  - bock_lisa
  - weigel_katja
datasets_cmip6:
- project: CMIP6
  dataset: '*'
  exp: historical
  ensemble: r1i1p1f1
  grid: gn
  institute: '*'
  timerange: 19950101/20141231
datasets_tos:
- project: OBS6
  dataset: ESACCI-SST
  type: sat
  version: 3.0-L4-analysis
  tier: 2
  timerange: 20020101/20211231
- project: OBS
  dataset: HadISST
  type: reanaly
  version: '1'
  tier: 2
  timerange: 20020101/20211231
- project: OBS6
  dataset: NOAA-ERSSTv5
  type: reanaly
  version: v5
  tier: 2
  timerange: 20010101/20201231
- project: OBS6
  dataset: WOA
  type: clim
  version: '2018'
  tier: 2
  timerange: 20000101/20001231
datasets_so:
- project: OBS6
  dataset: WOA
  type: clim
  version: '2018'
  tier: 2
  timerange: 20000101/20001231
plot_script:
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize:
    - 7
    - 5
  group_variables_by: variable_group
  plot_filename: '{plot_type}_{exp}_{real_name}_{dataset}_{mip}'
  plot_folder: '{plot_dir}'
variable_vs_lat_plot:
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor:
    - 0.5
    - -0.4
    borderaxespad: 0.0
  pyplot_kwargs:
    title: '{title}'
  plot_kwargs:
    ICON:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    ICON_historical-202510p1:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    ICON_ICON-XPP:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    ICON_ICON-XPP_historical-202510p1:
      label: '{dataset} ({exp})'
      linewidth: 1.25
      zorder: 2.5
      color: C0
    default:
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: '{project}'
    CMIP6_CESM2:
      label: '{project}'
    OBS:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
    OBS6:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dashdot
    native6:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dotted
    OBS_HadISST:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
    OBS6_ESACCI-SST:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dashed
    OBS6_NOAA-ERSSTv5:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dashdot
    OBS6_WOA:
      color: black
      label: '{dataset}'
      linewidth: 1.0
      zorder: 2.4
      linestyle: dotted
datasets:
- supplementary_variables:
  - short_name: areacella
    skip: true
  - short_name: areacello
    skip: true
  - short_name: sftlf
    skip: true
  - short_name: sftof
    skip: true
  dataset: ICON-XPP
  exp: historical-202510p1
  project: ICON
  timerange: 19790101/19990101
preprocessors:
  create_zonal_mean:
    custom_order: true
    regrid:
      scheme: linear
      target_grid: 2x2
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -77
      end_latitude: 90
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: degC
  create_zonal_mean_sos:
    custom_order: true
    extract_levels:
      coordinate: depth
      levels: 0
      scheme: nearest_extrapolate
    regrid:
      scheme: linear
      target_grid: 2x2
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -77
      end_latitude: 90
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: g/kg
