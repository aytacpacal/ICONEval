# ESMValTool
#DASK --memory_limit=7760MB
#DASK --n_workers=4
#TAGS atmosphere
#TAGS basics
#TAGS profiles
---
documentation:
  title: Basic Model Evaluation (Profiles).
  description: Profiles of basic physical variables of the climate system.
  authors:
    - schlund_manuel
    - lauer_axel
    - hassler_birgit
    - bonnet_pauline


# YAML anchors for later use

datasets_hus: &datasets_hus
  - {project: native6, dataset: ERA5, type: reanaly, version: v1, tier: 3, reference_for_monitor_diags: true, alias: ERA5, timerange: "{{timerange}}"}  # 19790101/20191231

datasets_ta: &datasets_ta
  - {project: native6, dataset: ERA5, type: reanaly, version: v1, tier: 3, reference_for_monitor_diags: true, alias: ERA5, timerange: "{{timerange}}"}  # 19790101/20211231

datasets_ua: &datasets_ua
  - {project: native6, dataset: ERA5, type: reanaly, version: v1, tier: 3, reference_for_monitor_diags: true, alias: ERA5, timerange: "{{timerange}}"}  # 19790101/20201231

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

zonal_mean_profile_plot: &zonal_mean_profile_plot
  common_cbar: true
  fontsize: 8
  pyplot_kwargs:
    suptitle: "{title} ({{timerange}})"
  plot_kwargs:
    default:
      cmap: plasma
      levels: 12


datasets: "{{dataset_list}}"


preprocessors:

  create_zonal_mean_profile:
    custom_order: true
    extract_levels:
      levels: {cmor_table: CMIP6, coordinate: plev19}
      scheme: linear
      coordinate: air_pressure
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full


diagnostics:

  zonal_mean_profiles_hus:
    description: Zonal mean profile plots of specific humidity.
    themes:
      - phys
    realms:
      - atmos
    variables:
      hus:
        mip: Amon
        preprocessor: create_zonal_mean_profile
        title: Specific Humidity
        additional_datasets: *datasets_hus
    scripts:
      plot:
        <<: *plot_script
        plots:
          zonal_mean_profile:
            <<: *zonal_mean_profile_plot
            plot_kwargs:
              default:
                cmap: Blues
                norm: log
                levels: [1.0e-7, 3.16e-7, 1.0e-6, 3.16e-6, 1.0e-5, 3.16e-5, 1.0e-4, 3.16e-4, 1.0e-3, 3.16e-3, 1.0e-2, 3.16e-2, 1.0e-1]
            plot_kwargs_bias:
              levels: 12

  zonal_mean_profiles_ta:
    description: Zonal mean profile plots of temperature.
    themes:
      - phys
    realms:
      - atmos
    variables:
      ta:
        mip: Amon
        preprocessor: create_zonal_mean_profile
        title: Air Temperature
        additional_datasets: *datasets_ta
    scripts:
      plot:
        <<: *plot_script
        plots:
          zonal_mean_profile:
            <<: *zonal_mean_profile_plot

  zonal_mean_profiles_ua:
    description: Zonal mean profile plots of eastward wind.
    themes:
      - phys
    realms:
      - atmos
    variables:
      ua:
        mip: Amon
        preprocessor: create_zonal_mean_profile
        title: Eastward Wind
        additional_datasets: *datasets_ua
    scripts:
      plot:
        <<: *plot_script
        plots:
          zonal_mean_profile:
            <<: *zonal_mean_profile_plot
            plot_kwargs:
              default:
                cmap: PuOr
                norm: centered
