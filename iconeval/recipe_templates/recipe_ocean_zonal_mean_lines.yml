# ESMValTool
#TAGS ocean
#TAGS zonal-means
---
documentation:
  title: Ocean Evaluation (Zonal Means).
  description: >
    <p>Zonal mean line plots of ocean variables.</p>
    <p><i>Note</i></p>
    <p>Time ranges for the different datasets differ:
    <ul>
    <li>{{dataset}}: {{timerange}}</li>
    <li>ESACCI-SST: 20020101/20211231</li>
    <li>HadISST: 20020101/20211231</li>
    <li>NOAA-ERSSTv5: 20010101/20201231</li>
    <li>WOA: 20000101/20001231</li>
    </ul></p>
  authors:
    - bock_lisa
    - weigel_katja


# YAML anchors for later use

datasets_cmip6: &datasets_cmip6
  - {project: CMIP6, dataset: "*", exp: historical, ensemble: r1i1p1f1, grid: gn, institute: "*", timerange: 19950101/20141231}  # 18500101/20141231

datasets_tos: &datasets_tos
  - {project: OBS6, dataset: ESACCI-SST, type: sat, version: 3.0-L4-analysis, tier: 2, timerange: 20020101/20211231}  # 19800101/20211231
  - {project: OBS, dataset: HadISST, type: reanaly, version: "1", tier: 2, timerange: "20020101/20211231"}  # 18700101/20211231
  - {project: OBS6, dataset: NOAA-ERSSTv5, type: reanaly, version: v5, tier: 2, timerange: 20010101/20201231}  # 18540101/20201231
  - {project: OBS6, dataset: WOA, type: clim, version: "2018", tier: 2, timerange: 20000101/20001231}  # 20000101/20001231

datasets_so: &datasets_so
  - {project: OBS6, dataset: WOA, type: clim, version: "2018", tier: 2, timerange: 20000101/20001231}  # 20000101/20001231

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

variable_vs_lat_plot: &variable_vs_lat_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS_HadISST: *obs_format
    OBS6_ESACCI-SST:
      <<: *obs_format
      linestyle: dashed
    OBS6_NOAA-ERSSTv5: *obs6_format
    OBS6_WOA: *native6_format


datasets: "{{dataset_list}}"


preprocessors:

  create_zonal_mean:
    custom_order: true
    regrid:
      scheme: linear  # some models do not work with ESMFAreaWeighted
      target_grid: 2x2
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -77
      end_latitude: 90
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: degC

  create_zonal_mean_sos:
    custom_order: true
    extract_levels:
      coordinate: depth
      levels: 0
      scheme: nearest_extrapolate
    regrid:
      scheme: linear  # some models do not work with ESMFAreaWeighted
      target_grid: 2x2
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -77
      end_latitude: 90
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: g/kg


diagnostics:

  zonal_means_tos:
    description: Zonal mean line plots of sea surface temperature.
    themes:
      - phys
    realms:
      - ocean
    variables:
      tos:
        mip: Omon
        preprocessor: create_zonal_mean
        title: Sea Surface Temperature
        additional_datasets: *datasets_tos
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          variable_vs_lat:
            <<: *variable_vs_lat_plot

  zonal_means_sos:
    description: Zonal mean line plots of sea surface salinity.
    themes:
      - phys
    realms:
      - ocean
    variables:
      so:
        mip: Omon
        preprocessor: create_zonal_mean_sos
        title: Sea Surface Salinity
        additional_datasets: *datasets_so
    scripts:
      plot:
        <<: *plot_script
        plots:
          variable_vs_lat:
            <<: *variable_vs_lat_plot
