# ESMValTool
#DASK --memory_limit=7760MB
#DASK --n_workers=4
#TAGS ocean
#TAGS timeseries
---
documentation:
  title: Ocean Evaluation (Time Series).
  description: Time series of ocean variables.
  authors:
    - bock_lisa
    - weigel_katja


# YAML anchors for later use

datasets_cmip6: &datasets_cmip6
  - {project: CMIP6, dataset: "*", exp: historical, ensemble: r1i1p1f1, grid: gn, institute: "*", timerange: 19790101/20141231}  # 18500101/20141231

defaults_cmip6: &defaults_cmip6
  project: CMIP6
  exp: historical
  ensemble: r1i1p1f1
  grid: gn
  timerange: 19790101/20141231  # 18500101/20141231

datasets_amoc: &datasets_amoc  # fix list of models (otherwise very few are found due to the derived variable)
  - {<<: *defaults_cmip6, dataset: ACCESS-CM2}
  - {<<: *defaults_cmip6, dataset: ACCESS-ESM1-5}
  - {<<: *defaults_cmip6, dataset: CanESM5}
  - {<<: *defaults_cmip6, dataset: CESM2}
  - {<<: *defaults_cmip6, dataset: HadGEM3-GC31-LL, ensemble: r1i1p1f3}
  - {<<: *defaults_cmip6, dataset: ICON-ESM-LR}
  - {<<: *defaults_cmip6, dataset: MPI-ESM-1-2-HAM}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-HR}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-LR}
  - {<<: *defaults_cmip6, dataset: UKESM1-0-LL, ensemble: r1i1p1f2}
  - {project: OBS6, dataset: RAPID, type: exp, version: 2024.1a, tier: 3, timerange: 20040101/20241231, force_derivation: false}  # 20040101/20241231

datasets_phcint_total: &datasets_phcint_total  # fix list of models to avoid CMOR check error
  - {<<: *defaults_cmip6, dataset: ACCESS-CM2}
  - {<<: *defaults_cmip6, dataset: ACCESS-ESM1-5}
  - {<<: *defaults_cmip6, dataset: CAMS-CSM1-0}
  - {<<: *defaults_cmip6, dataset: CanESM5}
  - {<<: *defaults_cmip6, dataset: EC-Earth3}
  - {<<: *defaults_cmip6, dataset: HadGEM3-GC31-LL, ensemble: r1i1p1f3}
  - {<<: *defaults_cmip6, dataset: ICON-ESM-LR}
  - {<<: *defaults_cmip6, dataset: IPSL-CM6A-LR}
  - {<<: *defaults_cmip6, dataset: MPI-ESM-1-2-HAM}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-HR}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-LR}
  - {<<: *defaults_cmip6, dataset: MRI-ESM2-0}
  - {<<: *defaults_cmip6, dataset: UKESM1-0-LL, ensemble: r1i1p1f2}
  - {project: OBS6, dataset: EN4, type: reanaly, version: 4.2.2, tier: 2, timerange: 19790101/20251231}  # 19000101/20251231
  - {project: OBS6, dataset: IAP, type: reanaly, version: v4.2, tier: 2, timerange: 19790101/20241231}  # 19400101/20241231

datasets_tos: &datasets_tos
  - {project: OBS6, dataset: ESACCI-SST, type: sat, version: 3.0-L4-analysis, tier: 2, timerange: 19800101/20211231}  # 19800101/20211231
  - {project: OBS, dataset: HadISST, type: reanaly, version: "1", tier: 2, timerange: 19790101/20211231}  # 18700101/20211231
  - {project: OBS6, dataset: NOAA-ERSSTv5, type: reanaly, version: v5, tier: 2, timerange: 19790101/20201231}  # 18540101/20201231


supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

timeseries_plot: &timeseries_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CanESM5:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS_HadISST: *obs_format
    OBS6_EN4: *obs_format
    OBS6_ESACCI-SST:
      <<: *obs_format
      linestyle: dashed
    OBS6_IAP:
      <<: *obs_format
      linestyle: dashed
    OBS6_NOAA-ERSSTv5: *obs6_format
    OBS6_RAPID: *obs6_format


datasets: "{{dataset_list}}"


preprocessors:
  create_amoc_time_series:
    annual_statistics:
      operator: mean
    convert_units:
      units: Tg s-1

  create_nino34_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: -170
      end_longitude: -120
      start_latitude: -5
      end_latitude: 5
    mask_landsea:
      mask_out: land
    anomalies:
      period: month
    rolling_window_statistics:
      coordinate: time
      operator: mean
      window_length: 3
    area_statistics:
      operator: mean

  create_ohc_anomaly_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
    anomalies:
      period: full
      reference:
        start_year: 1995
        start_month: 1
        start_day: 1
        end_year: 2014
        end_month: 12
        end_day: 31
    convert_units:
      units: ZJ

  create_tos_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean
    convert_units:
      units: degC


diagnostics:

  timeseries_amoc:
    description: Time series for AMOC at the Rapid array (26.5°N)
    themes:
      - phys
    realms:
      - ocean
    variables:
      amoc:
        mip: Omon
        derive: true
        force_derivation: true
        preprocessor: create_amoc_time_series
        title: AMOC at the Rapid array (26.5°N)
        additional_datasets: *datasets_amoc
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
            pyplot_kwargs:
              title: "{title}"
              ylabel: "Meridional overturning mass streamfunction [{units}]"

  timeseries_nino34:
    description: Time series for Oceanic Nino Index in Nino 3.4 region.
    themes:
      - phys
    realms:
      - ocean
    variables:
      tos:
        mip: Omon
        preprocessor: create_nino34_time_series
        title: Nino 3.4
        additional_datasets: *datasets_tos
        supplementary_variables: *supplementary_variables
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
            hlines:
              - y: -1.5
                color: darkgray
                linestyle: dashed
                linewidth: 1.0
              - y: 1.5
                color: darkgray
                linestyle: dashed
                linewidth: 1.0
            pyplot_kwargs:
              title: "{title}"
              ylim: [-3, 3]
              ylabel: "Oceanic Nino Index [{units}]"

  timeseries_phcint_total:
    description: Time series for global total ocean heat content anomaly.
    themes:
      - phys
    realms:
      - ocean
    variables:
      phcint_total:
        mip: Omon
        derive: true
        preprocessor: create_ohc_anomaly_time_series
        title: Global Ocean Heat Content Anomaly (relative to 1995-2014)
        additional_datasets: *datasets_phcint_total
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot

  timeseries_tos:
    description: Time series for global mean sea surface temperature.
    themes:
      - phys
    realms:
      - ocean
    variables:
      tos:
        mip: Omon
        preprocessor: create_tos_time_series
        title: Global Mean Sea Surface Temperature
        additional_datasets: *datasets_tos
        supplementary_variables: *supplementary_variables
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
