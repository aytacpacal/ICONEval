# ESMValTool
#TAGS sanity-consistency-checks
#TAGS timeseries
---
documentation:
  title: Consistency checks (Time series).
  description: Time series for different consistency checks.
  authors:
    - lauer_axel
    - bock_lisa


# YAML anchors for later use

datasets_ps: &datasets_ps
  - {dataset: ERA5, project: native6, type: reanaly, version: v1, tier: 3, timerange: 19790101/20141231}  # 19790101/20141231

datasets_prw: &datasets_prw
  - {dataset: ERA5, project: native6, type: reanaly, version: v1, tier: 3, timerange: 19790101/20141231}  # 19790101/20211231
  - {dataset: MERRA2, project: OBS6, type: reanaly, version: 5.12.4, tier: 3, timerange: 19800101/20141231}  # 19800101/20220731
  - {dataset: ESACCI-WATERVAPOUR, project: OBS6, type: sat, version: CDR2-L3-COMBI-05deg-fv3.1, tier: 3, timerange: 20020101/20141231}  # 20020731/20171231

datasets_qep: &datasets_qep
  - {dataset: ERA5, project: native6, type: reanaly, version: v1, tier: 3, timerange: 19790101/20141231}  # 19790101/20211231
  - {dataset: MERRA2, project: OBS6, type: reanaly, version: 5.12.4, tier: 3, timerange: 19800101/20141231}  # 19800101/20220731

supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

timeseries_plot: &timeseries_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS6_ESACCI-WATERVAPOUR: *obs_format
    OBS6_MERRA2: *obs6_format
    native6_ERA5: *native6_format
    ERA5: *native6_format


datasets: "{{dataset_list}}"


preprocessors:

  global_sum_anom:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean
    anomalies:
      period: full
      relative: true

  global_sum:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    area_statistics:
      operator: sum
    annual_statistics:
      operator: mean


diagnostics:

  air_mass_anom:
    description: Time series of global air mass anomaly.
    themes:
      - phys
    realms:
      - atmos
    variables:
      ps:
        mip: Amon
        preprocessor: global_sum_anom
        additional_datasets: *datasets_ps
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
            caption: Timeseries of global air mass anomaly.
            hlines:
              - y: 0.0
                color: black
                linewidth: 1.0
            pyplot_kwargs:
              title: Anomaly total air mass
              ylabel: Air mass anomaly [%]


  global_watervapor:
    description: Time series of global total water vapor mass.
    themes:
      - phys
    realms:
      - atmos
    variables:
      prw:
        mip: Amon
        preprocessor: global_sum_anom
        additional_datasets: *datasets_prw
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
            caption: Time series of anomalies in global total water vapor mass.
            pyplot_kwargs:
              title: Anomalies in atmospheric water vapor
              ylabel: Water vapor mass anomaly [%]


  moisture_flux:
    description: Time series of moisture flux into the atmosphere.
    variables:
      qep:
        var_type: atm_2d_ml  # workaround; should be added to ICON extra facets
        mip: Amon
        derive: true
        force_derivation: true
        preprocessor: global_sum
        additional_datasets: *datasets_qep
        supplementary_variables: *supplementary_variables
    scripts:
      timeseries:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
            caption: Time series of global moisture flux into the atmosphere anomaly.
            hlines:
              - y: 0.0
                color: black
                linewidth: 1.0
            pyplot_kwargs:
              title: Global moisture flux into the atmosphere
              ylabel: Moisture flux [kg/s]
