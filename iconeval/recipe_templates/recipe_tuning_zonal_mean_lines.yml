plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

variable_vs_lat_plot: &variable_vs_lat_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS_CERES-EBAF: *obs_format
    OBS_CLARA-AVHRR:
      <<: *obs_format
      color: gray
      linestyle: dashed
    OBS_CLOUDSAT-L2:
      <<: *obs_format
      color: gray
      linestyle: dotted
    OBS_ESACCI-CLOUD:
      <<: *obs_format
      linestyle: dashed
    OBS_GPCP-SG: *obs_format
    OBS_ISCCP-FH:
      <<: *obs_format
      color: gray
    OBS_MODIS: *obs_format
    OBS_PATMOS-x:
      <<: *obs_format
      color: gray
      linestyle: dotted
    OBS6_ESACCI-WATERVAPOUR: *obs_format
    OBS6_MERRA2: *obs6_format
    native6_ERA5: *native6_format
    ERA5: *native6_format


datasets: "{{dataset_list}}"


preprocessors:

  create_zonal_mean:
    custom_order: true
    regrid:
      scheme: linear  # some models do not work with ESMFAreaWeighted
      target_grid: 2x2
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full

  create_zonal_mean_pr:
    custom_order: true
    regrid:
      scheme: linear  # some models do not work with ESMFAreaWeighted
      target_grid: 2x2
    zonal_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: full
    convert_units:
      units: mm day-1


diagnostics:

  zonal_means:
    description: Zonal mean line plots for multiple variables.
    themes:
      - phys
      - clouds
    realms:
      - atmos
    variables:
      asr:
        mip: Amon
        derive: true
        force_derivation: true
        preprocessor: create_zonal_mean
        title: Absorbed Shortwave Radiation
        additional_datasets: *datasets_asr
      clivi:
        mip: Amon
        preprocessor: create_zonal_mean
        title: Ice Water Path
        additional_datasets: *datasets_clivi
      clt:
        mip: Amon
        preprocessor: create_zonal_mean
        title: Total Cloud Cover
        additional_datasets: *datasets_clt
      clwvi:
        mip: Amon
        preprocessor: create_zonal_mean
        title: Condensed Water Path
        additional_datasets: *datasets_clwvi
      lwcre:
        mip: Amon
        derive: true
        force_derivation: true
        preprocessor: create_zonal_mean
        title: TOA Longwave Cloud Radiative Effect
        additional_datasets: *datasets_lwcre
      lwp:
        mip: Amon
        derive: true
        preprocessor: create_zonal_mean
        title: Liquid Water Path
        additional_datasets: *datasets_lwp
      pr:
        mip: Amon
        preprocessor: create_zonal_mean_pr
        title: Precipitation
        additional_datasets: *datasets_pr
      prw:
        mip: Amon
        preprocessor: create_zonal_mean
        title: Water Vapor Path
        additional_datasets: *datasets_prw
      rlut:
        mip: Amon
        preprocessor: create_zonal_mean
        title: TOA Outgoing Longwave Radiation
        additional_datasets: *datasets_rlut
      rtmt:
        mip: Amon
        preprocessor: create_zonal_mean
        title: TOA Net Downward Total Radiation
      swcre:
        mip: Amon
        derive: true
        force_derivation: true
        preprocessor: create_zonal_mean
        title: TOA Shortwave Cloud Radiative Effect
        additional_datasets: *datasets_swcre
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          variable_vs_lat:
            <<: *variable_vs_lat_plot
