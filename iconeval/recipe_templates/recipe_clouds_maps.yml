plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

map_plot: &map_plot
  common_cbar: true
  fontsize: 8
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  pyplot_kwargs:
    suptitle: "{title}"
  plot_kwargs:
    default:
      cmap: Blues
      levels: 12

map_plot_cre: &map_plot_cre
  common_cbar: true
  fontsize: 8
  pyplot_kwargs:
    suptitle: "{title}"
  plot_kwargs:
    default:
      cmap: bwr
      norm: centered


datasets: "{{dataset_list}}"


preprocessors:

  create_map:
    custom_order: true
    align_metadata:
      target_project: OBS6
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    climate_statistics:
      operator: mean
      period: full
    multi_model_statistics:
      statistics: [mean]
      span: full
      keep_input_datasets: false
      ignore_scalar_coords: true
      exclude: ["{{dataset}}", ICON-XPP]


diagnostics:

  maps_clivi:
    description: Map plots of ice water path.
    themes:
      - clouds
    realms:
      - atmos
    variables:
      clivi:
        mip: Amon
        preprocessor: create_map
        title: Ice Water Path
        additional_datasets: *datasets_clivi
    scripts:
      plot:
        <<: *plot_script
        plots:
          map:
            <<: *map_plot

  maps_clt:
    description: Map plots of total cloud cover.
    themes:
      - clouds
    realms:
      - atmos
    variables:
      clt:
        mip: Amon
