# ESMValTool
#TAGS atmosphere
#TAGS basics
#TAGS precipitation
#TAGS annual-cycles
---
documentation:
  title: Basic Model Evaluation (Annual Cycles).
  description: >
    <p>Annual cycles of basic physical variables of the climate system.</p>
    <p><i>Note</i></p>
    <p>Time ranges for the different datasets differ:
    <ul>
    <li>{{dataset}}: {{timerange}}</li>
    <li>CMIP6: 19950101/20141231</li>
    <li>CERES-EBAF: 20030101/20221231</li>
    <li>ERA5: 20020101/20211231</li>
    <li>HadCRUT5: 20020101/20211231</li>
    <li>GPCP-SG: 20030101/20221231</li>
    <li>ISCCP-FH: 19970101/20161231</li>
    <li>MERRA2: 20020101/20211231</li>
    </ul></p>
  authors:
    - schlund_manuel


# YAML anchors for later use

datasets_cmip6: &datasets_cmip6
  - {project: CMIP6, dataset: "*", exp: historical, ensemble: r1i1p1f1, grid: "*", institute: "*", timerange: 19950101/20141231}  # 18500101/20141231

datasets_hfls: &datasets_hfls
  - {project: OBS6, dataset: MERRA2, type: reanaly, version: 5.12.4, tier: 3, timerange: 20020101/20211231}  # 19800101/20220731

datasets_hfss: &datasets_hfss
  - {project: OBS6, dataset: MERRA2, type: reanaly, version: 5.12.4, tier: 3, timerange: 20020101/20211231}  # 19800101/20220731

datasets_pr: &datasets_pr
  - {project: native6, dataset: ERA5, type: reanaly, version: v1, tier: 3, reference_for_monitor_diags: true, timerange: 20020101/20211231}  # 19590101/20211231
  - {project: OBS, dataset: GPCP-SG, type: atmos, version: 2.3, tier: 2, reference_for_monitor_diags: true, timerange: 20030101/20221231}  # 19790101/20230430

datasets_rlut: &datasets_rlut
  - {project: OBS, dataset: CERES-EBAF, type: sat, version: Ed4.2, tier: 2, timerange: 20030101/20221231}  # 20000331/20231130
  - {project: OBS, dataset: ISCCP-FH, type: sat, version: v0, tier: 2, timerange: 19970101/20161231}  # 19840101/20161231
  - {project: OBS6, dataset: MERRA2, type: reanaly, version: 5.12.4, tier: 3, timerange: 20020101/20211231}  # 19800101/20220731

datasets_rsut: &datasets_rsut
  - {project: OBS, dataset: CERES-EBAF, type: sat, version: Ed4.2, tier: 2, timerange: 20030101/20221231}  # 20000331/20231130
  - {project: OBS, dataset: ISCCP-FH, type: sat, version: v0, tier: 2, timerange: 19970101/20161231}  # 19840101/20161231
  - {project: OBS6, dataset: MERRA2, type: reanaly, version: 5.12.4, tier: 3, timerange: 20020101/20211231}  # 19800101/20220731

datasets_tas: &datasets_tas
  - {project: native6, dataset: ERA5, type: reanaly, version: v1, tier: 3, timerange: 20020101/20211231}  # 19590101/20211231
  - {project: OBS, dataset: HadCRUT5, type: ground, version: 5.0.1.0-analysis, tier: 2, timerange: 20020101/20211231}  # 18500101/20211231
  - {project: OBS6, dataset: MERRA2, type: reanaly, version: 5.12.4, tier: 3, timerange: 20020101/20211231}  # 19800101/20220731

supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

annual_cycle_plot: &annual_cycle_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS_CERES-EBAF: *obs_format
    OBS_GPCP-SG: *obs_format
    OBS_HadCRUT5: *obs_format
    OBS_ISCCP-FH:
      <<: *obs_format
      linestyle: dashed
    OBS6_MERRA2: *obs6_format
    native6_ERA5: *native6_format
    ERA5: *native6_format


datasets: "{{dataset_list}}"


preprocessors:

  create_monthly_climatology:
    custom_order: true
    regrid:
      scheme: linear  # some models do not work with ESMFAreaWeighted
      target_grid: 2x2
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month

  create_monthly_climatology_pr:
    custom_order: true
    regrid:
      scheme: linear  # some models do not work with ESMFAreaWeighted
      target_grid: 2x2
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month
    convert_units:
      units: mm day-1


diagnostics:

  annual_cycles:
    description: Annual cycle plots for multiple variables.
    themes:
      - phys
    realms:
      - atmos
    variables:
      hfls:
        mip: Amon
        preprocessor: create_monthly_climatology
        title: Global Mean Surface Upward Latent Heat Flux
        additional_datasets: *datasets_hfls
        supplementary_variables: *supplementary_variables
      hfss:
        mip: Amon
        preprocessor: create_monthly_climatology
        title: Global Mean Surface Upward Sensible Heat Flux
        additional_datasets: *datasets_hfss
        supplementary_variables: *supplementary_variables
      pr:
        mip: Amon
        preprocessor: create_monthly_climatology_pr
        title: Precipitation
        additional_datasets: *datasets_pr
        supplementary_variables: *supplementary_variables
      rlut:
        mip: Amon
        preprocessor: create_monthly_climatology
        title: TOA Outgoing Longwave Radiation
        additional_datasets: *datasets_rlut
        supplementary_variables: *supplementary_variables
      rsut:
        mip: Amon
        preprocessor: create_monthly_climatology
        title: Global Mean TOA Outgoing Shortwave Radiation
        additional_datasets: *datasets_rsut
        supplementary_variables: *supplementary_variables
      tas:
        mip: Amon
        preprocessor: create_monthly_climatology
        title: Global Mean Near-Surface Air Temperature
        additional_datasets: *datasets_tas
        supplementary_variables: *supplementary_variables
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          annual_cycle:
            <<: *annual_cycle_plot
