      plot:
        script: portrait_plot.py
        x_by: alias
        y_by: variable
        group_by: project
        normalize: centered_median
        default_split: ref_1
        nan_color: null
        matplotlib_rc_params:
          xtick.labelsize: 6
          ytick.labelsize: 6
        plot_kwargs:
          vmin: -0.5
          vmax: +0.5
        cbar_kwargs:
