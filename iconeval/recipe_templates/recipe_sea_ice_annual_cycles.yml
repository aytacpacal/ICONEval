# ESMValTool
#TAGS ocean
#TAGS sea-ice
#TAGS annual-cycles
---
documentation:
  title: Sea Ice Evaluation (Annual Cycles)
  description: >
    <p>Annual cycle plots of sea ice variables.</p>
    <p><i>Note</i></p>
    <p>Time ranges for the different datasets differ:
    <ul>
    <li>{{dataset}}: {{timerange}}</li>
    <li>HadISST: 20020101/20211231</li>
    <li>NSIDC-G02202-sh: 20030101/20221231</li>
    <li>OSI-450-nh: 20010101/20201231</li>
    <li>OSI-450-sh: 20010101/20201231</li>
    </ul></p>
  authors:
    - bock_lisa
    - weigel_katja


# YAML anchors for later use

defaults_cmip6: &defaults_cmip6
  project: CMIP6
  exp: historical
  ensemble: r1i1p1f1
  grid: gn
  timerange: 19950101/20141231  # 18500101/20141231

datasets_cmip6: &datasets_cmip6  # fix list of models to avoid CMOR check error
  - {<<: *defaults_cmip6, dataset: ACCESS-CM2}
  - {<<: *defaults_cmip6, dataset: ACCESS-ESM1-5}
  - {<<: *defaults_cmip6, dataset: BCC-CSM2-MR}
  - {<<: *defaults_cmip6, dataset: CAMS-CSM1-0}
  - {<<: *defaults_cmip6, dataset: CanESM5}
  - {<<: *defaults_cmip6, dataset: CESM2-WACCM-FV2}
  - {<<: *defaults_cmip6, dataset: CESM2-WACCM}
  - {<<: *defaults_cmip6, dataset: CESM2}
  - {<<: *defaults_cmip6, dataset: EC-Earth3}
  - {<<: *defaults_cmip6, dataset: FIO-ESM-2-0}
  - {<<: *defaults_cmip6, dataset: HadGEM3-GC31-LL, ensemble: r1i1p1f3}
  - {<<: *defaults_cmip6, dataset: ICON-ESM-LR}
  - {<<: *defaults_cmip6, dataset: IPSL-CM6A-LR}
  - {<<: *defaults_cmip6, dataset: MIROC6}
  - {<<: *defaults_cmip6, dataset: MPI-ESM-1-2-HAM}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-HR}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-LR}
  - {<<: *defaults_cmip6, dataset: MRI-ESM2-0}
  - {<<: *defaults_cmip6, dataset: UKESM1-0-LL, ensemble: r1i1p1f2}

datasets_siconc_nh: &datasets_siconc_nh
  - {project: OBS, dataset: OSI-450-nh, type: reanaly, version: v3, tier: 2, mip: OImon, timerange: 20010101/20201231}  # 19790101/20201231
  - {project: OBS, dataset: HadISST, type: reanaly, version: "1", tier: 2, mip: OImon, timerange: 20020101/20211231}  # 18700101/20211231

datasets_siconc_sh: &datasets_siconc_sh
  - {project: OBS, dataset: OSI-450-sh, type: reanaly, version: v3, tier: 2, mip: OImon, timerange: 20010101/20201231}  # 19790101/20201231
  - {project: OBS, dataset: HadISST, type: reanaly, version: "1", tier: 2, mip: OImon, timerange: 20020101/20211231}  # 18700101/20211231
  - {project: OBS6, dataset: NSIDC-G02202-sh, type: reanaly, version: "4", tier: 3, timerange: 20030101/20221231}  # 19790101/20221231

supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

annual_cycle_plot: &annual_cycle_plot
  aspect_ratio: 0.5
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    OBS_OSI-450-nh: *obs_format
    OBS_OSI-450-sh: *obs_format
    OBS_HadISST:
      <<: *obs_format
      linestyle: dashed
    OBS6_NSIDC-G02202-sh: *obs6_format


datasets: "{{dataset_list}}"


preprocessors:

  create_monthly_climatology_nh:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 30
      end_latitude: 90
    area_statistics:
      operator: sum
    climate_statistics:
      period: month
    convert_units:
      units: 1e6 km2

  create_monthly_climatology_sh:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: -30
    area_statistics:
      operator: sum
    climate_statistics:
      period: month
    convert_units:
      units: 1e6 km2


diagnostics:

  annual_cycles:
    description: Annual cycle plots.
    themes:
      - phys
    realms:
      - seaIce
    variables:
      siconc_nh:
        short_name: siconc
        mip: SImon
        preprocessor: create_monthly_climatology_nh
        title: Sea-Ice Area Percentage (Northern Hemisphere)
        additional_datasets: *datasets_siconc_nh
        supplementary_variables: *supplementary_variables
      siconc_sh:
        short_name: siconc
        mip: SImon
        preprocessor: create_monthly_climatology_sh
        title: Sea-Ice Area Percentage (Southern Hemisphere)
        additional_datasets: *datasets_siconc_sh
        supplementary_variables: *supplementary_variables
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          annual_cycle:
            <<: *annual_cycle_plot
