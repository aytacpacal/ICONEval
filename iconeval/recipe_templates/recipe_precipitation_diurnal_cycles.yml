# ESMValTool
#DASK --memory_limit=7760MB
#DASK --n_workers=4
#TAGS atmosphere
#TAGS precipitation
#TAGS diurnal-cycles
#TAGS subdaily
---
documentation:
  title: Model Evaluation of Subdaily Precipitation (Diurnal Cycles).
  description: Diurnal cycles of precipitation.
  authors:
    - bock_lisa
    - schlund_manuel


# YAML anchors for later use

datasets_pr: &datasets_pr
  - {project: native6, dataset: ERA5, alias: ERA5, type: reanaly, version: v1, frequency: 1hr,
     tier: 3, timerange: "{{timerange}}"}  # 19790101/20201231

supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

line_plot_script: &line_plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

diurnal_cycle_line_plot: &diurnal_cycle_line_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
    ylabel: "{short_name}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    native6_ERA5: *native6_format
    ERA5: *native6_format

map_plot_script: &map_plot_script
  script: hydrology/hour_of_max_precipitation.py
  caption: Hour of daily maximum precipitation in the Tropics (30°S-30°N) for {alias}.


datasets: "{{dataset_list}}"


preprocessors:

  diurnal_cycle_tropics_ocean:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -30
      end_latitude: 30
    mask_landsea:
      mask_out: land
    local_solar_time:
    area_statistics:
      operator: mean
    climate_statistics:
      period: hourly
    convert_units:
      units: mm day-1


  diurnal_cycle_tropics_land:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -30
      end_latitude: 30
    mask_landsea:
      mask_out: sea
    local_solar_time:
    area_statistics:
      operator: mean
    climate_statistics:
      period: hourly
    convert_units:
      units: mm day-1

  diurnal_cycle_north_jja_land:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 20
      end_latitude: 70
    mask_landsea:
      mask_out: sea
    local_solar_time:
    area_statistics:
      operator: mean
    extract_season:
      season: JJA
    climate_statistics:
      period: hourly
    convert_units:
      units: mm day-1

  diurnal_cycle_south_djf_land:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -70
      end_latitude: -20
    mask_landsea:
      mask_out: sea
    local_solar_time:
    area_statistics:
      operator: mean
    extract_season:
      season: DJF
    climate_statistics:
      period: hourly
    convert_units:
      units: mm day-1

  diurnal_cycle_map_tropics:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    extract_region:
      start_latitude: -30
      end_latitude: 30
      start_longitude: 0
      end_longitude: 360
    local_solar_time:
    climate_statistics:
      period: hourly
    convert_units:
      units: mm day-1


diagnostics:

  diurnal_cycles:
    description: Diurnal cycles of precipitation.
    themes:
      - phys
    realms:
      - atmos
    variables:
      pr_tropical_ocean:
        short_name: pr
        mip: 3hr
        preprocessor: diurnal_cycle_tropics_ocean
        title: Precipitation over Ocean (Tropics, 30S-30N)
        additional_datasets: *datasets_pr
        supplementary_variables: *supplementary_variables
      pr_tropical_land:
        short_name: pr
        mip: 3hr
        preprocessor: diurnal_cycle_tropics_land
        title: Precipitation over Land (Tropics, 30S-30N)
        additional_datasets: *datasets_pr
        supplementary_variables: *supplementary_variables
      pr_north_jja_land:
        short_name: pr
        mip: 3hr
        preprocessor: diurnal_cycle_north_jja_land
        title: Precipitation over Land (Northern Extratropics, 20-70N, JJA)
        additional_datasets: *datasets_pr
        supplementary_variables: *supplementary_variables
      pr_south_djf_land:
        short_name: pr
        mip: 3hr
        preprocessor: diurnal_cycle_south_djf_land
        title: Precipitation over Land (Southern Extratropics, 20-70S, DJF)
        additional_datasets: *datasets_pr
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *line_plot_script
        plots:
          diurnal_cycle:
            <<: *diurnal_cycle_line_plot

  hour_of_maximum_precipitation:
    description: Hour of maximum precipitation.
    themes:
      - phys
    realms:
      - atmos
    variables:
      pr:
        mip: 3hr
        preprocessor: diurnal_cycle_map_tropics
        additional_datasets: *datasets_pr
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *map_plot_script
