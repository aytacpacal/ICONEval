  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

annual_cycle_plot: &annual_cycle_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS_CERES-EBAF: *obs_format
    OBS_CLARA-AVHRR:
      <<: *obs_format
      color: gray
      linestyle: dashed
    OBS_CLOUDSAT-L2:
      <<: *obs_format
      color: gray
      linestyle: dotted
    OBS_ESACCI-CLOUD:
      <<: *obs_format
      linestyle: dashed
    OBS_GPCP-SG: *obs_format
    OBS_ISCCP-FH:
      <<: *obs_format
      color: gray
    OBS_MODIS: *obs_format
    OBS_PATMOS-x:
      <<: *obs_format
      color: gray
      linestyle: dotted
    OBS6_ESACCI-WATERVAPOUR: *obs_format
    OBS6_MERRA2: *obs6_format
    native6_ERA5: *native6_format
    ERA5: *native6_format


datasets: "{{dataset_list}}"


preprocessors:

  create_monthly_climatology_ne_pacific:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 220
      end_longitude: 240
      start_latitude: 15
      end_latitude: 35
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month

  create_monthly_climatology_se_atlantic:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: -10
      end_longitude: 10
      start_latitude: -30
      end_latitude: -10
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month

  create_monthly_climatology_se_pacific:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 265
      end_longitude: 285
      start_latitude: -30
      end_latitude: -10
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month


diagnostics:

  annual_cycles_ne_pacific:
    description: Annual cycle plots (North East Pacific; ocean over 15-35N, 140-120W).
    themes:
      - clouds
    realms:
      - atmos
    variables:
      clivi:
        mip: Amon
        preprocessor: create_monthly_climatology_ne_pacific
        title: Ice Water Path (North East Pacific; ocean over 15-35N, 140-120W)
        additional_datasets: *datasets_clivi
        supplementary_variables: *supplementary_variables
      clt:
        mip: Amon
        preprocessor: create_monthly_climatology_ne_pacific
        title: Total Cloud Cover (North East Pacific; ocean over 15-35N, 140-120W)
        additional_datasets: *datasets_clt
