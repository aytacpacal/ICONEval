# ESMValTool
#TAGS atmosphere
#TAGS clouds
#TAGS annual-cycles
---
documentation:
  title: Model Evaluation with Focus on Clouds (Annual Cycles in Subtropical Stratocumulus Regions).
  description: >
    <p>Annual cycles of several cloud-related variables in subtropical stratocumulus regions.</p>
    <p><i>Note</i></p>
    <p>Time ranges for the different datasets differ:
    <ul>
    <li>{{dataset}}: {{timerange}}</li>
    <li>CMIP6: 19950101/20141231</li>
    <li>CERES-EBAF: 20030101/20221231</li>
    <li>CLARA-AVHRR: 19990101/20181231</li>
    <li>CLOUDSAT-L2: 20060101/20171231</li>
    <li>ERA5: 20000101/20191231</li>
    <li>ESACCI-CLOUD: 19970101/20161231</li>
    <li>ESACCI-WATERVAPOUR: 20030101/20171231</li>
    <li>ISCCP-FH: 19970101/20161231</li>
    <li>MODIS: 20030101/20181231</li>
    <li>MERRA2: 20020101/20211231</li>
    <li>PATMOS-x: 19970101/20161231</li>
    </ul></p>
  authors:
    - schlund_manuel
    - lauer_axel


# YAML anchors for later use

