# ESMValTool
#DASK --memory_limit=7760MB
#DASK --n_workers=4
#TAGS atmosphere
#TAGS precipitation
#TAGS histogram
#TAGS subdaily
---
documentation:
  title: Model Evaluation of Subdaily Precipitation (Histograms).
  description: Histograms of precipitation.
  authors:
    - bock_lisa


# YAML anchors for later use

datasets_pr: &datasets_pr
  - {project: native6, dataset: ERA5, type: reanaly, version: v1, frequency: 1hr,
     tier: 3, timerange: "{{timerange}}"}  # 19790101/20201231


datasets: "{{dataset_list}}"


preprocessors:

  histogram_tropics:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -30
      end_latitude: 30
    hourly_statistics:
      hours: 3
      operator: mean
    convert_units:
      units: mm hour-1
    histogram:
      bins: 150
      bin_range: [0.0, 15.0]
      normalization: integral


diagnostics:

  plot_precipitation_histograms_tropics:
    description: Precipitation histogram (Tropics).
    variables:
      pr:
        mip: 3hr
        preprocessor: histogram_tropics
        additional_datasets: *datasets_pr
    scripts:
      plot:
        script: plot_histogram.py
        log_y: true
        suptitle: Simulated Precipitation (Tropics, 30S-30N)
        xlabel: Precipitation rate (mm hour-1)
        ylabel: Density
