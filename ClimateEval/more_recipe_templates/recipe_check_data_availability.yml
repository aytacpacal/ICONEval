# ESMValTool
---
documentation:
  title: Data Availability.
  description: Check if all necessary variables are present for a simulation.
  authors:
    - schlund_manuel


datasets: "{{dataset_list}}"


preprocessors:

  regrid_to_regular_grid:
    regrid:
      target_grid: 2x2
      scheme:
        reference: esmf_regrid.schemes:ESMFAreaWeighted


diagnostics:

  vars_atmos_2d:
    description: Atmospheric 2D variables.
    themes:
      - phys
    realms:
      - atmos
    variables:
      asr:
        mip: Amon
        preprocessor: regrid_to_regular_grid
        derive: true
        force_derivation: true
      clivi:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      clt:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      clwvi:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      evspsbl:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      hfls:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      hfss:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      lwcre:
        mip: Amon
        preprocessor: regrid_to_regular_grid
        derive: true
        force_derivation: true
      lwp:
        mip: Amon
        preprocessor: regrid_to_regular_grid
        derive: true
      pr:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      prw:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      ps:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      psl:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      rlut:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      rlutcs:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      rsut:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      rsutcs:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      rtmt:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      swcre:
        mip: Amon
        preprocessor: regrid_to_regular_grid
        derive: true
        force_derivation: true
      tas:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      ts:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      tauu:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      tauv:
        mip: Amon
        preprocessor: regrid_to_regular_grid
    scripts: null

  vars_atmos_3d:
    description: Atmospheric 3D variables.
    themes:
      - phys
    realms:
      - atmos
    variables:
      cl:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      cli:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      clw:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      hus:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      ta:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      ua:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      va:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      wap:
        mip: Amon
        preprocessor: regrid_to_regular_grid
      zg:
        mip: Amon
