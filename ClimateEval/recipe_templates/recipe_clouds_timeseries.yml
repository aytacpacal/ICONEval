supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

timeseries_plot: &timeseries_plot
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title}"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted
    OBS_CERES-EBAF: *obs_format
    OBS_CLARA-AVHRR:
      <<: *obs_format
      color: gray
      linestyle: dashed
    OBS_CLOUDSAT-L2:
      <<: *obs_format
      color: gray
      linestyle: dotted
    OBS_ESACCI-CLOUD:
      <<: *obs_format
      linestyle: dashed
    OBS_GPCP-SG: *obs_format
    OBS_ISCCP-FH:
      <<: *obs_format
      color: gray
    OBS_MODIS: *obs_format
    OBS_PATMOS-x:
      <<: *obs_format
      color: gray
      linestyle: dotted
    OBS6_ESACCI-WATERVAPOUR: *obs_format
    OBS6_MERRA2: *obs6_format
    native6_ERA5: *native6_format
    ERA5: *native6_format


datasets: "{{dataset_list}}"


preprocessors:

  create_global_annual_mean_time_series:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    area_statistics:
      operator: mean
    annual_statistics:
      operator: mean


diagnostics:

  timeseries:
    description: Time series for multiple variables.
    themes:
      - clouds
    realms:
      - atmos
    variables:
      clivi:
        mip: Amon
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean Ice Water Path
        additional_datasets: *datasets_clivi
        supplementary_variables: *supplementary_variables
      clt:
        mip: Amon
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean Total Cloud Cover
        additional_datasets: *datasets_clt
        supplementary_variables: *supplementary_variables
      clwvi:
        mip: Amon
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean Condensed Water Path
        additional_datasets: *datasets_clwvi
        supplementary_variables: *supplementary_variables
      lwcre:
        mip: Amon
        derive: true
        force_derivation: true
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean TOA Longwave Cloud Radiative Effect
        additional_datasets: *datasets_lwcre
        supplementary_variables: *supplementary_variables
      lwp:
        mip: Amon
        derive: true
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean Liquid Water Path
        additional_datasets: *datasets_lwp
        supplementary_variables: *supplementary_variables
      prw:
        mip: Amon
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean Water Vapor Path
        additional_datasets: *datasets_prw
        supplementary_variables: *supplementary_variables
      swcre:
        mip: Amon
        derive: true
        force_derivation: true
        preprocessor: create_global_annual_mean_time_series
        title: Global Mean TOA Shortwave Cloud Radiative Effect
        additional_datasets: *datasets_swcre
        supplementary_variables: *supplementary_variables
    additional_datasets: *datasets_cmip6
    scripts:
      plot:
        <<: *plot_script
        plots:
          timeseries:
            <<: *timeseries_plot
