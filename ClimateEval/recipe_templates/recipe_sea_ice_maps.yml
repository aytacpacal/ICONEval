# ESMValTool
#TAGS ocean
#TAGS sea-ice
#TAGS maps
---
documentation:
  title: Sea Ice Evaluation (Maps).
  description: Map plots of sea ice variables.
  authors:
    - bock_lisa
    - schlund_manuel
    - weigel_katja


# YAML anchors for later use

datasets_siconc_nh: &datasets_siconc_nh
  - {project: OBS, dataset: OSI-450-nh, type: reanaly, version: v3, tier: 2, mip: OImon, reference_for_monitor_diags: true, alias: OSI-450-nh, timerange: "{{timerange}}"}  # 19790101/20201231

datasets_siconc_sh: &datasets_siconc_sh
  - {project: OBS, dataset: OSI-450-sh, type: reanaly, version: v3, tier: 2, mip: OImon, reference_for_monitor_diags: true, alias: OSI-450-sh, timerange: "{{timerange}}"}  # 19790101/20201231

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

map_plot_nh: &map_plot_nh
  axes_kwargs:
    set_extent: [0, 360, 40, 90]
  common_cbar: true
  fontsize: 8
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  projection: NorthPolarStereo
  projection_kwargs:
    central_longitude: 270
  pyplot_kwargs:
    suptitle: "{title} ({{timerange}})"
  plot_kwargs:
    default:
      cmap: Blues_r
      levels: 12

map_plot_sh: &map_plot_sh
  axes_kwargs:
    set_extent: [0, 360, -90, -40]
  common_cbar: true
  fontsize: 8
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  projection: SouthPolarStereo
  projection_kwargs:
    central_longitude: 270
  pyplot_kwargs:
    suptitle: "{title} ({{timerange}})"
  plot_kwargs:
    default:
      cmap: Blues_r
      levels: 12


datasets: "{{dataset_list}}"


preprocessors:

  create_map_nh:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 40
      end_latitude: 90
    mask_landsea:
      mask_out: land
    climate_statistics:
      operator: mean
      period: full

  create_map_nh_feb:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 40
      end_latitude: 90
    mask_landsea:
      mask_out: land
    extract_month:
      month: 2
    climate_statistics:
      operator: mean
      period: full

  create_map_nh_sep:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: 40
      end_latitude: 90
    mask_landsea:
      mask_out: land
    extract_month:
      month: 9
    climate_statistics:
      operator: mean
      period: full

  create_map_sh:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: -40
    mask_landsea:
      mask_out: land
    climate_statistics:
      operator: mean
      period: full

  create_map_sh_feb:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: -40
    mask_landsea:
      mask_out: land
    extract_month:
      month: 2
    climate_statistics:
      operator: mean
      period: full

  create_map_sh_sep:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: 0
      end_longitude: 360
      start_latitude: -90
      end_latitude: -40
    mask_landsea:
      mask_out: land
    extract_month:
      month: 9
    climate_statistics:
      operator: mean
      period: full


diagnostics:

  plot_siconc_nh:
    description: Map plots of Northern hemisphere sea-ice area percentage.
    themes:
      - phys
    realms:
      - seaIce
    variables:
      siconc:
        mip: SImon
        title: Sea-Ice Area Percentage
        preprocessor: create_map_nh
        additional_datasets: *datasets_siconc_nh
      siconc_feb:
        short_name: siconc
        mip: SImon
        title: Sea-Ice Area Percentage in February
        preprocessor: create_map_nh_feb
        additional_datasets: *datasets_siconc_nh
      siconc_sep:
        short_name: siconc
        mip: SImon
        title: Sea-Ice Area Percentage in September
        preprocessor: create_map_nh_sep
        additional_datasets: *datasets_siconc_nh
    scripts:
      plot:
        <<: *plot_script
        plots:
          map:
            <<: *map_plot_nh

  plot_siconc_sh:
    description: Map plots of Southern hemisphere sea-ice area percentage.
    themes:
      - phys
    realms:
      - seaIce
    variables:
      siconc:
        mip: SImon
        title: Sea-Ice Area Percentage
        preprocessor: create_map_sh
        additional_datasets: *datasets_siconc_sh
      siconc_feb:
        short_name: siconc
        mip: SImon
        title: Sea-Ice Area Percentage in February
        preprocessor: create_map_sh_feb
        additional_datasets: *datasets_siconc_sh
      siconc_sep:
        short_name: siconc
        mip: SImon
        title: Sea-Ice Area Percentage in September
        preprocessor: create_map_sh_sep
        additional_datasets: *datasets_siconc_sh
    scripts:
      plot:
        <<: *plot_script
        plots:
          map:
            <<: *map_plot_sh
