# ESMValTool
#TAGS ocean
#TAGS maps
#TAGS annual-cycles
---
documentation:
  title: Ocean Evaluation (Annual Cycles)
  description: Annual cycles of ocean variables.
    (ongoing) model simulations.
  authors:
    - bock_lisa
    - weigel_katja


# YAML anchors for later use

defaults_cmip6: &defaults_cmip6
  project: CMIP6
  exp: historical
  ensemble: r1i1p1f1
  grid: gn
  timerange: "{{timerange}}"  # 18500101/20141231

datasets_cmip6: &datasets_cmip6  # fix list of models to avoid CMOR check error
  - {<<: *defaults_cmip6, dataset: ACCESS-CM2}
  - {<<: *defaults_cmip6, dataset: ACCESS-ESM1-5}
  - {<<: *defaults_cmip6, dataset: CAMS-CSM1-0}
  - {<<: *defaults_cmip6, dataset: CanESM5}
  - {<<: *defaults_cmip6, dataset: CESM2-WACCM-FV2}
  - {<<: *defaults_cmip6, dataset: CESM2-WACCM}
  - {<<: *defaults_cmip6, dataset: CESM2}
  - {<<: *defaults_cmip6, dataset: EC-Earth3}
  - {<<: *defaults_cmip6, dataset: HadGEM3-GC31-LL, ensemble: r1i1p1f3}
  - {<<: *defaults_cmip6, dataset: ICON-ESM-LR}
  - {<<: *defaults_cmip6, dataset: IPSL-CM6A-LR}
  - {<<: *defaults_cmip6, dataset: MIROC6}
  - {<<: *defaults_cmip6, dataset: MPI-ESM-1-2-HAM}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-HR}
  - {<<: *defaults_cmip6, dataset: MPI-ESM1-2-LR}
  - {<<: *defaults_cmip6, dataset: MRI-ESM2-0}
  - {<<: *defaults_cmip6, dataset: UKESM1-0-LL, ensemble: r1i1p1f2}

supplementary_variables: &supplementary_variables
  - {short_name: areacella, skip: true}
  - {short_name: areacello, skip: true}
  - {short_name: sftlf, skip: true}
  - {short_name: sftof, skip: true}

plot_script: &plot_script
  script: monitor/multi_datasets.py
  facet_used_for_labels: alias
  figure_kwargs:
    figsize: [7, 5]
  group_variables_by: variable_group
  plot_filename: "{plot_type}_{exp}_{real_name}_{dataset}_{mip}"
  plot_folder: "{plot_dir}"

annual_cycle_plot: &annual_cycle_plot
  aspect_ratio: 0.5
  gridline_kwargs:
    color: darkgray
    linewidth: 0.5
    alpha: 0.3
  legend_kwargs:
    loc: upper center
    bbox_to_anchor: [0.5, -0.4]
    borderaxespad: 0.0
  pyplot_kwargs:
    title: "{title} ({{timerange}})"
  plot_kwargs:
    "{{alias_plot_kwargs}}":
      label: "{dataset} ({exp})"
      linewidth: 1.25
      zorder: 2.5
    default:  # These will be used for CMIP6 models
      color: lightgray
      label: null
      linewidth: 0.75
      zorder: 1.0
    CMIP6:
      label: "{project}"  # just to have one label for the gray lines
    CMIP6_CESM2:
      label: "{project}"  # just to have one label for the gray lines
    OBS: &obs_format
      color: black
      label: "{dataset}"
      linewidth: 1.0
      zorder: 2.4
    OBS6: &obs6_format
      <<: *obs_format
      linestyle: dashdot
    native6: &native6_format
      <<: *obs_format
      linestyle: dotted


datasets: "{{dataset_list}}"


preprocessors:

  create_monthly_climatology_southern_ocean:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_shape:
      shapefile: ar6
      crop: true
      decomposed: true
      ids:
        Name:
          - Southern-Ocean
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month

  create_monthly_climatology_labrador_sea:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: -67
      end_longitude: -42
      start_latitude: 46
      end_latitude: 66
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month

  create_monthly_climatology_weddell_sea:
    custom_order: true
    regrid:
      target_grid: 2x2
      scheme: linear  # some models do not work with ESMFAreaWeighted
    extract_region:
      start_longitude: -66
      end_longitude: -16
      start_latitude: -77
      end_latitude: -60
    mask_landsea:
      mask_out: land
    area_statistics:
      operator: mean
    climate_statistics:
      operator: mean
      period: month


diagnostics:

  annual_cycles:
    description: Annual cycle plots.
    themes:
      - phys
    realms:
      - ocean
    variables:
      mlotst_labrador_sea:
        short_name: mlotst
        mip: Omon
        preprocessor: create_monthly_climatology_labrador_sea
        title: Mixed Layer Depth for Labrador Sea
        additional_datasets: *datasets_cmip6
        supplementary_variables: *supplementary_variables
      mlotst_southern_ocean:
        short_name: mlotst
        mip: Omon
        preprocessor: create_monthly_climatology_southern_ocean
        title: Mixed Layer Depth for Southern Ocean
        additional_datasets: *datasets_cmip6
        supplementary_variables: *supplementary_variables
      mlotst_weddell_sea:
        short_name: mlotst
        mip: Omon
        preprocessor: create_monthly_climatology_weddell_sea
        title: Mixed Layer Depth for Weddell Sea
        additional_datasets: *datasets_cmip6
        supplementary_variables: *supplementary_variables
    scripts:
      plot:
        <<: *plot_script
        plots:
          annual_cycle:
            <<: *annual_cycle_plot
